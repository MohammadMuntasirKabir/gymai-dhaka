services:
  # Backend API
  - type: web
    name: gymai-dhaka-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: OPEN_ROUTER_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: BASE_URL
        sync: false

  # Frontend static site
  - type: static
    name: gymai-dhaka
    plan: free
    buildCommand: cd .. && npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_NEON_AUTH_URL
        sync: false
      - key: VITE_API_URL
        fromService:
          name: gymai-dhaka-api
          type: web
          property: url
